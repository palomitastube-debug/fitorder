<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitOrder</title>
  <style>
    body{
      font-family:Arial,sans-serif;
      background:#111827;
      color:white;
      max-width:700px;
      margin:40px auto;
      padding:20px;
    }
    .card{
      background:#1f2937;
      padding:20px;
      border-radius:16px;
      margin-bottom:20px;
    }
    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:999px;
      background:#22c55e;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }
    .result{
      background:#052e16;
      border:1px solid #22c55e;
      padding:18px;
      border-radius:16px;
      margin-top:20px;
    }
  </style>
</head>
<body>

  <h1>🍔 FitOrder</h1>
  <p>Encuentra comida que encaje en tus calorías.</p>

  <div class="card">
    <label>Tipo de comida</label><br><br>
    <select id="tipo">
      <option value="hamburguesa">Hamburguesa</option>
      <option value="burrito">Burrito</option>
      <option value="pizza">Pizza</option>
    </select>
  </div>

  <div class="card">
    <label>Calorías disponibles: <span id="kcalTexto">800</span> kcal</label><br><br>
    <input type="range" id="kcal" min="300" max="1500" step="50" value="800" style="width:100%;">
  </div>

  <button onclick="buscar()">🔎 Buscar comida</button>

  <div id="salida"></div>

  <script>
    const platos = [
      {tipo:'hamburguesa', nombre:'Whopper', restaurante:'Burger King', kcal:643, prote:30.4},
      {tipo:'hamburguesa', nombre:'Steakhouse', restaurante:'Burger King', kcal:707, prote:36.2},
      {tipo:'hamburguesa', nombre:'Long Chicken', restaurante:'Burger King', kcal:585, prote:22},

      {tipo:'burrito', nombre:'Burrito Supreme Pollo', restaurante:'Taco Bell', kcal:349, prote:29.6},
      {tipo:'burrito', nombre:'Crunchywrap Pollo', restaurante:'Taco Bell', kcal:505, prote:49.8},

      {tipo:'pizza', nombre:'Pollo a la Parrilla', restaurante:'Domino\\'s', kcal:181, prote:10},
      {tipo:'pizza', nombre:'Margarita', restaurante:'Domino\\'s', kcal:212, prote:9.4}
    ];

    const slider = document.getElementById('kcal');
    const texto = document.getElementById('kcalTexto');

    slider.oninput = function(){
      texto.textContent = this.value;
    };

    function buscar(){
      const tipo = document.getElementById('tipo').value;
      const limite = parseInt(slider.value);

      const resultados = platos
        .filter(p => p.tipo === tipo && p.kcal <= limite)
        .sort((a,b) => b.prote - a.prote);

      const salida = document.getElementById('salida');
      salida.innerHTML = '';

      if(resultados.length === 0){
        salida.innerHTML = '<div class="result">No hay opciones dentro de tus calorías.</div>';
        return;
      }

      resultados.forEach((p,i) => {
        salida.innerHTML += `
          <div class="result">
            ${i===0 ? '<strong>✅ Mejor opción</strong><br><br>' : ''}
            <h2>${p.nombre}</h2>
            <p><strong>${p.restaurante}</strong></p>
            <p>🔥 ${p.kcal} kcal</p>
            <p>💪 ${p.prote} g proteína</p>
            <p>📉 Te sobran ${limite - p.kcal} kcal</p>
          </div>
        `;
      });
    }

    buscar();
  </script>

</body>
</html>
