<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitOrder - Pide sin salirte de tus calorías</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#f3f4f6;
      color:#111827;
      display:flex;
      justify-content:center;
      padding:24px;
    }

    .container{
      width:100%;
      max-width:680px;
      background:white;
      border-radius:22px;
      padding:28px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
    }

    h1{
      margin:0;
      text-align:center;
      font-size:2.2rem;
    }

    .subtitle{
      text-align:center;
      color:#6b7280;
      margin-top:8px;
      margin-bottom:28px;
      line-height:1.4;
    }

    label{
      display:block;
      font-weight:700;
      margin-top:18px;
      margin-bottom:8px;
    }

    select,input,button{
      width:100%;
      padding:14px;
      border-radius:12px;
      border:1px solid #d1d5db;
      font-size:16px;
    }

    button{
      margin-top:22px;
      background:#16a34a;
      color:white;
      border:none;
      font-weight:700;
      cursor:pointer;
      transition:0.2s ease;
    }

    button:hover{
      background:#15803d;
      transform:translateY(-1px);
    }

    .hero{
      background:#f0fdf4;
      border:2px solid #16a34a;
      border-radius:16px;
      padding:18px;
      margin-top:26px;
    }

    .hero small{
      color:#166534;
      font-weight:700;
      letter-spacing:.3px;
    }

    .hero h2{
      margin:8px 0 6px;
      font-size:1.35rem;
    }

    .hero .meta{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      font-weight:700;
    }

    .results{
      margin-top:18px;
      display:grid;
      gap:14px;
    }

    .card{
      border:1px solid #e5e7eb;
      border-radius:16px;
      padding:16px;
      background:#fff;
    }

    .card h3{
      margin:0 0 6px;
      font-size:1.1rem;
    }

    .restaurant{
      color:#374151;
      font-weight:700;
      margin-bottom:10px;
    }

    .stats{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      font-size:15px;
      font-weight:700;
    }

    .empty{
      margin-top:18px;
      padding:16px;
      border-radius:12px;
      background:#fef2f2;
      border:1px solid #fecaca;
      color:#991b1b;
      font-weight:700;
      text-align:center;
    }

    .footer{
      margin-top:26px;
      text-align:center;
      color:#6b7280;
      font-size:14px;
    }

    @media (max-width:640px){
      .container{
        padding:22px;
      }

      h1{
        font-size:1.9rem;
      }
    }
  </style>

</head>
<body>

  <div class="container">

```
<h1>🍔 FitOrder</h1>
<p class="subtitle">
  Encuentra qué pedir en restaurantes sin salirte de tu dieta.
  Elige el tipo de comida y las calorías que te quedan hoy.
</p>

<label for="tipo">¿Qué te apetece hoy?</label>
<select id="tipo">
  <option value="hamburguesa">🍔 Hamburguesa</option>
  <option value="burrito">🌯 Burrito</option>
</select>

<label for="kcal">¿Cuántas kcal te quedan hoy?</label>
<input type="number" id="kcal" value="800" min="200" step="50" />

<button onclick="buscar()">Encontrar mi mejor opción</button>

<div id="salida"></div>

<div class="footer">
  MVP v0.1 · Datos oficiales de Burger King y Taco Bell
</div>
```

  </div>

  <script>
    const platos = [
      { restaurante: 'Burger King', plato: 'Whopper', kcal: 643, proteina: 30.4, tipo: 'hamburguesa' },
      { restaurante: 'Burger King', plato: 'Steakhouse', kcal: 707, proteina: 36.2, tipo: 'hamburguesa' },
      { restaurante: 'Burger King', plato: 'Long Chicken', kcal: 585, proteina: 22.0, tipo: 'hamburguesa' },

      { restaurante: 'Taco Bell', plato: 'Burrito Supreme Pollo Picante', kcal: 349, proteina: 29.6, tipo: 'burrito' },
      { restaurante: 'Taco Bell', plato: 'Crunchywrap Supreme Pollo Asado', kcal: 505, proteina: 49.8, tipo: 'burrito' }
    ];

    function buscar(){

      const tipo = document.getElementById('tipo').value;
      const kcal = parseInt(document.getElementById('kcal').value);

      const resultados = platos
        .filter(p => p.tipo === tipo && p.kcal <= kcal)
        .sort((a,b) => b.proteina - a.proteina);

      const salida = document.getElementById('salida');

      if(resultados.length === 0){
        salida.innerHTML = `
          <div class="empty">
            No hay opciones dentro de ${kcal} kcal.
          </div>
        `;
        return;
      }

      const mejor = resultados[0];

      let html = `
        <div class="hero">
          <small>✅ MEJOR OPCIÓN PARA TI HOY</small>
          <h2>${mejor.plato}</h2>
          <div class="restaurant">${mejor.restaurante}</div>
          <div class="meta">
            <span>🔥 ${mejor.kcal} kcal</span>
            <span>💪 ${mejor.proteina} g proteína</span>
            <span>📉 Te sobran ${kcal - mejor.kcal} kcal</span>
          </div>
        </div>

        <div class="results">
      `;

      resultados.forEach(p => {
        html += `
          <div class="card">
            <h3>${p.plato}</h3>
            <div class="restaurant">${p.restaurante}</div>
            <div class="stats">
              <span>🔥 ${p.kcal} kcal</span>
              <span>💪 ${p.proteina} g proteína</span>
            </div>
          </div>
        `;
      });

      html += '</div>';

      salida.innerHTML = html;
    }

    buscar();
  </script>

</body>
</html>
