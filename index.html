<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitOrder</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      margin:0;
      padding:40px;
      display:flex;
      justify-content:center;
    }
    .card{
      background:white;
      width:500px;
      padding:30px;
      border-radius:16px;
      box-shadow:0 4px 20px rgba(0,0,0,.1);
    }
    h1{
      margin-top:0;
      text-align:center;
    }
    input, select, button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:16px;
    }
    button{
      background:#16a34a;
      color:white;
      border:none;
      cursor:pointer;
      font-weight:bold;
    }
    .result{
      margin-top:20px;
      padding:15px;
      border:1px solid #ddd;
      border-radius:10px;
      background:#fafafa;
    }
  </style>
</head>
<body>
  <div class="card">
<h1>FitOrder</h1>
<p style="text-align:center;color:#666;">
  Pide comida sin salirte de tus calorías
</p>

    <label>¿Qué te apetece?</label>
    <select id="tipo">
      <option value="hamburguesa">Hamburguesa</option>
      <option value="burrito">Burrito</option>
    </select>

    <label>¿Cuántas kcal te quedan hoy?</label>
    <input type="number" id="kcal" value="800" />

    <button onclick="buscar()">Buscar comida</button>

    <div id="resultados"></div>
  </div>

<script>
const platos = [
  { restaurante: 'Burger King', plato: 'Whopper', kcal: 643, proteina: 30.4, tipo: 'hamburguesa' },
  { restaurante: 'Burger King', plato: 'Steakhouse', kcal: 707, proteina: 36.2, tipo: 'hamburguesa' },
  { restaurante: 'Burger King', plato: 'Long Chicken', kcal: 585, proteina: 22, tipo: 'hamburguesa' },
  { restaurante: 'Taco Bell', plato: 'Burrito Supreme Pollo Picante', kcal: 349, proteina: 29.6, tipo: 'burrito' },
  { restaurante: 'Taco Bell', plato: 'Crunchywrap Supreme Pollo Asado', kcal: 505, proteina: 49.8, tipo: 'burrito' }
];

function buscar(){
  const tipo = document.getElementById('tipo').value;
  const kcal = parseInt(document.getElementById('kcal').value);

  const resultados = platos
    .filter(p => p.tipo === tipo && p.kcal <= kcal)
    .sort((a,b) => b.proteina - a.proteina);

  const contenedor = document.getElementById('resultados');
  contenedor.innerHTML = '';

  if(resultados.length === 0){
    contenedor.innerHTML = '<p>No hay opciones dentro de tus calorías.</p>';
    return;
    
  if(resultados.length > 0){
  contenedor.innerHTML += `
    <div class="result" style="border:2px solid #16a34a;background:#f0fdf4;">
      <strong>✅ Mejor opción para ti hoy</strong>
      <p>${resultados[0].plato} — ${resultados[0].kcal} kcal</p>
    </div>
  `;
}

  resultados.forEach(p => {
    contenedor.innerHTML += `
      <div class="result">
        <h3>${p.plato}</h3>
        <p><strong>${p.restaurante}</strong></p>
        <p>🔥 ${p.kcal} kcal</p>
        <p>💪 ${p.proteina} g proteína</p>
      </div>
    `;
  });
}

buscar();
</script>
</body>
</html>
