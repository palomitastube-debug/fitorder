<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitOrder - MVP</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0b1220;
      color:white;
      display:flex;
      justify-content:center;
      padding:24px;
    }

    .app{
      width:100%;
      max-width:800px;
      background:#111827;
      border-radius:20px;
      padding:24px;
      box-shadow:0 10px 30px rgba(0,0,0,.4);
    }

    h1{
      margin:0;
      font-size:40px;
    }

    .sub{
      color:#cbd5e1;
      margin:8px 0 24px;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .box{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:16px;
      padding:18px;
    }

    label{
      display:block;
      font-weight:700;
      margin-bottom:10px;
    }

    select,input[type=range]{
      width:100%;
    }

    .kcal{
      margin-top:10px;
      font-weight:700;
      color:#86efac;
    }

    button{
      margin-top:16px;
      width:100%;
      padding:14px;
      border:none;
      border-radius:999px;
      background:#f8fafc;
      color:#111827;
      font-weight:800;
      cursor:pointer;
    }

    .result{
      margin-top:22px;
      background:#052e16;
      border:1px solid #86efac;
      border-radius:18px;
      padding:18px;
    }

    .result h2{
      margin:0 0 6px;
      font-size:32px;
    }

    .restaurant{
      text-decoration:underline;
      font-weight:700;
      margin-bottom:14px;
    }

    .macros{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
      font-weight:700;
    }

    .secondary{
      margin-top:14px;
      background:#0f172a;
      border:1px solid #334155;
      border-radius:14px;
      padding:14px;
    }

    @media (max-width:700px){
      .row{
        grid-template-columns:1fr;
      }

      h1{
        font-size:32px;
      }
    }
  </style>
</head>
<body>

<div class="app">

  <h1>🍔 FitOrder</h1>
  <div class="sub">Pide comida sin salirte de tus calorías.</div>

  <div class="row">

    <div class="box">
      <label>¿Qué te apetece?</label>

      <select id="tipo">
        <option value="hamburguesa">🍔 Hamburguesa</option>
        <option value="burrito">🌯 Burrito</option>
        <option value="pizza">🍕 Pizza</option>
      </select>
    </div>

    <div class="box">
      <label>¿Cuántas kcal te quedan?</label>

      <input type="range" id="kcalSlider" min="300" max="1500" step="50" value="800" />

      <div class="kcal" id="kcalValue">800 kcal</div>
    </div>

  </div>

  <button onclick="buscar()">🔎 Encontrar mi mejor opción</button>

  <div id="resultados"></div>

</div>

<script>

const platos = [
  { restaurante:'Burger King', plato:'Whopper', kcal:643, proteina:30.4, tipo:'hamburguesa' },
  { restaurante:'Burger King', plato:'Steakhouse', kcal:707, proteina:36.2, tipo:'hamburguesa' },
  { restaurante:'Burger King', plato:'Long Chicken', kcal:585, proteina:22.0, tipo:'hamburguesa' },

  { restaurante:'Taco Bell', plato:'Burrito Supreme Pollo Picante', kcal:349, proteina:29.6, tipo:'burrito' },
  { restaurante:'Taco Bell', plato:'Crunchywrap Supreme Pollo Asado', kcal:505, proteina:49.8, tipo:'burrito' },

  { restaurante:'Domino\\'s', plato:'Pollo a la Parrilla', kcal:181, proteina:10.0, tipo:'pizza' },
  { restaurante:'Domino\\'s', plato:'Margarita', kcal:212, proteina:9.4, tipo:'pizza' }
];

const slider = document.getElementById('kcalSlider');
const kcalValue = document.getElementById('kcalValue');

slider.addEventListener('input', function(){
  kcalValue.textContent = slider.value + ' kcal';
});

function buscar(){

  const tipo = document.getElementById('tipo').value;
  const kcal = parseInt(slider.value);

  const resultados = platos
    .filter(p => p.tipo === tipo && p.kcal <= kcal)
    .sort((a,b) => b.proteina - a.proteina);

  const cont = document.getElementById('resultados');
  cont.innerHTML = '';

  if(resultados.length === 0){
    cont.innerHTML = '<div class="result">No hay opciones dentro de tus calorías.</div>';
    return;
  }

  const mejor = resultados[0];

  cont.innerHTML += `
    <div class="result">
      <div style="font-size:12px;font-weight:800;color:#86efac;margin-bottom:8px;">
        ✅ MEJOR OPCIÓN
      </div>

      <h2>${mejor.plato}</h2>

      <div class="restaurant">${mejor.restaurante}</div>

      <div class="macros">
        <div>🔥 ${mejor.kcal} kcal</div>
        <div>💪 ${mejor.proteina} g proteína</div>
        <div>📉 Te sobran ${kcal - mejor.kcal} kcal</div>
      </div>
    </div>
  `;

  resultados.slice(1).forEach(p => {
    cont.innerHTML += `
      <div class="secondary">
        <strong>${p.plato}</strong> — ${p.restaurante}
        <div style="margin-top:6px">
          🔥 ${p.kcal} kcal · 💪 ${p.proteina} g proteína
        </div>
      </div>
    `;
  });
}

buscar();

</script>

</body>
</html>
